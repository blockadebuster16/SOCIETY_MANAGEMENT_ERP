openapi: 3.0.0
info:
  title: Suyash Pride Housing Society Portal API
  description: REST API specification for managing properties, residents, notices, bills, and complaints.
  version: 1.0.0
servers:
  - url: http://localhost:5000/api/v1
    description: Local development server
paths:
  /auth/register:
    post:
      summary: Register a new resident profile
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - firstName
                - lastName
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 6
                firstName:
                  type: string
                lastName:
                  type: string
                phone:
                  type: string
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccess'
        '400':
          description: Validation error or email already taken

  /auth/login:
    post:
      summary: Authenticate user credentials
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccess'
        '401':
          description: Invalid email or password

  /properties:
    get:
      summary: Retrieve all properties
      tags:
        - Properties
      parameters:
        - name: wingId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: unitType
          in: query
          required: false
          schema:
            type: string
            enum: [Residential, Commercial, Office]
      responses:
        '200':
          description: List of properties
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  properties:
                    type: array
                    items:
                      $ref: '#/components/schemas/Property'

  /complaints:
    post:
      summary: File a new maintenance complaint ticket
      tags:
        - Complaints
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - propertyId
                - category
                - subject
                - description
              properties:
                propertyId:
                  type: string
                  format: uuid
                category:
                  type: string
                subject:
                  type: string
                description:
                  type: string
                priority:
                  type: string
                  enum: [Low, Medium, High, Critical]
      responses:
        '201':
          description: Ticket logged successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  complaint:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      status:
                        type: string
                      createdAt:
                        type: string
                        format: date-time

  /payments/create-order:
    post:
      summary: Create a new Razorpay payment order
      tags:
        - Payments
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - propertyId
                - amount
                - purpose
              properties:
                propertyId:
                  type: string
                  format: uuid
                amount:
                  type: number
                purpose:
                  type: string
      responses:
        '201':
          description: Razorpay order generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  orderId:
                    type: string
                  amount:
                    type: number

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    AuthSuccess:
      type: object
      properties:
        success:
          type: boolean
        token:
          type: string
        user:
          type: object
          properties:
            id:
              type: string
              format: uuid
            email:
              type: string
            role:
              type: string
    Property:
      type: object
      properties:
        id:
          type: string
          format: uuid
        societyId:
          type: string
          format: uuid
        unitNumber:
          type: string
        unitType:
          type: string
        floorNumber:
          type: integer
        areaSqft:
          type: number
        ownershipStatus:
          type: string
